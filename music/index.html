<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AmaiCraft - Jukebox</title>
    <style>
        @font-face {
            font-family: 'Minecraftia';
            font-style: normal;
            font-weight: 400;
            src: local('Minecraftia'), url('../Minecraftia.woff') format('woff');
        }

        :root {
            --mc-gui-panel: #c6c6c6;
            --mc-border-dark: #555555;
            --mc-border-light: #ffffff;
        }

        body {
            /* ON REMET TON FOND LEAVES */
            background-image: url("Leaves.png");
            background-size: 64px;
            background-repeat: repeat;
            image-rendering: pixelated;
            font-family: 'Minecraftia', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- LE MENU DU HAUT (COPIÉ DE L'ACCUEIL) --- */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #000;
            padding: 20px;
            text-align: center;
            position: relative;
            min-height: 70px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            color: white;
            text-shadow: 3px 3px 0px #3f3f3f;
            letter-spacing: 2px;
        }

        header img {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            height: 100%;
            width: auto;
        }

        .nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav a {
            background: #555;
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        /* --- JUKEBOX BIEN AU CENTRE --- */
        #jukebox-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #jukebox {
            width: 220px; /* On le garde un peu plus grand pour le style */
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
            image-rendering: pixelated;
        }

        #jukebox.active { transform: scale(1.1); }

        /* --- INVENTAIRE --- */
        #inventory {
            background: var(--mc-gui-panel);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0 var(--mc-border-light), inset -4px -4px 0 var(--mc-border-dark);
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            z-index: 20;
            align-self: center;
        }

        .disc {
            width: 50px; height: 50px;
            cursor: pointer;
            image-rendering: pixelated;
        }

        .ejected-disc {
            position: absolute;
            width: 90px;
            pointer-events: none;
            z-index: 50;
            image-rendering: pixelated;
        }

        .drag-cursor {
            position: fixed;
            width: 50px; height: 50px;
            pointer-events: none;
            z-index: 9999;
            image-rendering: pixelated;
            display: none;
        }

        img { -webkit-user-drag: none; user-select: none; }
        
        /* Bloque la sélection bleue */
        .disc, #inventory, #jukebox {
            user-select: none;
            -webkit-user-select: none;
        }

        .nav { position: relative; } /* Important pour le bouton à gauche */

        #settings-btn {
            position: absolute;
            left: 10px;
        }

        /* Look du slider (Gris foncé comme ton image) */
        .mc-slider-container {
            position: relative;
            width: 300px;
            height: 40px;
            background: #404040; /* Gris foncé */
            border: 2px solid #000;
        }
        /* LE CURSEUR : Le petit rectangle gris avec bordure blanche (Image 1) */
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px; /* Un peu plus fin pour coller à l'image */
            height: 36px;
            background: rgb(163, 163, 163); /* Gris clair pour le centre */
            border: 2px solid #000; /* La bordure noire extérieure */
            
            /* L'effet de relief blanc/gris que tu as sur ton zoom */
            box-shadow: 
                inset 2px 2px 0px #ffffff,   /* Ligne blanche en haut à gauche */
                inset -2px -2px 0px #555555; /* Ligne grise foncée en bas à droite */
            
            cursor: pointer;
        }
        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: pointer;
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            margin: 0;
        }

        #close-settings {
            margin-top: 20px;
            width: 310px; /* Aligné avec la barre de volume */
            padding: 10px;
            background: #555; /* Gris moyen Minecraft */
            color: white;
            font-family: 'Minecraftia', sans-serif;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            /* L'effet de relief Minecraft */
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
        }

        #close-settings:hover {
            background: #666; /* Un peu plus clair au survol */
        }

        #close-settings:active {
            /* Effet d'enfoncement quand on clique */
            border-top-color: #000;
            border-left-color: #000;
            background: #444;
        }
        /* LE TEXTE : Centré par-dessus avec l'ombre portée (Image 2) */
        .mc-slider-label {
            position: absolute;
            width: 100%;
            line-height: 40px;
            text-align: center;
            color: white;
            /* 0,0,0 c'est du noir, et 0.6 c'est l'opacité (60%) */
            background-color: rgba(0, 0, 0, 0.6); 
            background-image: url("../recipecraft/assets/background/image.png");
            text-shadow: 2px 2px 0px #000;
            font-size: 16px;
            pointer-events: none;
            z-index: 1;
        }
        /* Container de la barre (Gris foncé de ton image) */
        .mc-slider-container {
            position: relative;
            width: 310px;
            height: 40px;
            background: #4b4b4b; 
            border: 2px solid #000;
        }

    </style>
</head>
<body>

<header>
    <h1>AMAICRAFT</h1>
    <img src="../parrotparty.gif" alt="Parrot Party">
</header>

<div class="nav">
    <a href="#" id="settings-btn">SETTINGS</a>
    <a href="../">HOME</a>
    <a href="https://minecraft.wiki" target="_blank" rel="noopener noreferrer">WIKI</a>
    <a href="https://www.minecraft.net/fr-fr/minecraft-tips-for-beginners" target="_blank" rel="noopener noreferrer">GUIDES</a>
</div>


<div id="settings-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; flex-direction:column; justify-content:center; align-items:center;">
    <h2 style="color:white;">Music & Sound Options</h2>
    <div class="mc-slider-container">
        <div class="mc-slider-label">Jukebox/Note Blocks: <span id="volume-value">100%</span></div>
        <input type="range" id="volume-slider" min="0" max="100" value="100">
    </div>
    <button id="close-settings">Close Settings</button>
</div>


<div id="jukebox-container">
    <img src="Jukebox.png" id="jukebox" alt="Jukebox">
</div>

<div id="inventory"></div>

<div id="yt-player"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const jukebox = document.getElementById('jukebox');
const inventory = document.getElementById('inventory');

// Dictionnaire des IDs YouTube
const ytIds = {
    "13": "hEb-LopwclA",
    "cat": "1MYu9h9hOJY",
    "blocks": "0dd5KI2LkKE",
    "chirp": "cCibTj6drhM",
    "far": "J3CD2423Aww",
    "mall": "oIyXfT_-7HY",
    "mellohi": "12KU49sLA1U",
    "stal": "R6AjFn99hGY",
    "strad": "x6N52XRku8A",
    "ward": "fV29b0PmkJU",
    "11": "9HkHjbW2fn8",
    "wait": "sBl9qcaQos4",
    "pigstep": "n_BxqJFL-28",
    "otherside": "kK81m-A3qpU",
    "creator": "2PPRi6q97fw",
    "creator_music_box": "EZsjkfWQ2Vs",
    "5": "mBRO4iNKSbg",
    "relic": "x9QP2TWSY0s",
    "precipice": "dEgjOyBwIaE",
    "tears": "Eo0QjT7mkzs",
    "lava_chicken": "QV7tGfxa58E"
};

let player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
        height: '0', width: '0', videoId: '',
        playerVars: { 'autoplay': 1, 'controls': 0 },
        events: {
            'onReady': (event) => {
                console.log("✅ Le lecteur est prêt !");
                event.target.unMute();
            },
            'onError': (event) => {
                // C'est ici que tu sauras pourquoi ça ne joue pas !
                const errorCodes = {
                    2: "ID de vidéo invalide",
                    5: "Contenu HTML5 impossible à lire",
                    100: "Vidéo supprimée ou privée",
                    101: "L'auteur interdit la lecture hors de YouTube",
                    150: "L'auteur interdit la lecture hors de YouTube"
                };
                console.error("❌ Erreur YouTube : " + (errorCodes[event.data] || "Erreur inconnue"));
                alert("Impossible de lire ce disque : " + (errorCodes[event.data] || "Vérifie les droits d'auteur"));
            },
            'onStateChange': (event) => {
                if (event.data == YT.PlayerState.PLAYING) {
                    console.log("🎵 Musique chargée et en cours de lecture !");
                }
            }
        }
    });
}
const dragIcon = document.createElement('img');
dragIcon.className = 'drag-cursor';
document.body.appendChild(dragIcon);

let isDragging = false;
let currentDiscData = null;
let currentDiscImg = null;
const discNames = Object.keys(ytIds);

discNames.forEach(name => {
    const img = document.createElement('img');
    img.src = `Discs/${name}.png`;
    img.className = 'disc';
    img.dataset.id = name; // ON DOIT UTILISER DATA-ID
    
    img.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isDragging = true;
        // ON STOCKE L'ID ICI
        currentDiscData = { id: img.dataset.id, src: img.src }; 
        dragIcon.src = img.src;
        dragIcon.style.display = 'block';
        updateDragPosition(e);
        img.style.opacity = "0.5";
    });
    inventory.appendChild(img);
});

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    updateDragPosition(e);
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
        jukebox.style.transform = "scale(1.1) rotate(5deg)";
    } else {
        jukebox.style.transform = "scale(1)";
    }
});

window.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
        
        // On récupère directement l'id (ex: "cat") stocké dans currentDiscData
        const discName = currentDiscData.id; 
        const videoId = ytIds[discName];

        if (videoId && player) {
            player.loadVideoById({
                videoId: videoId,
                startSeconds: 0,
                suggestedQuality: 'small'
            });
            player.unMute();
            player.setVolume(100);
            player.playVideo();
            
            currentDiscImg = currentDiscData.src;
            jukebox.classList.add('active');
            jukebox.style.transform = "scale(1)";
        }
    }
    isDragging = false;
    dragIcon.style.display = 'none';
    document.querySelectorAll('.disc').forEach(d => d.style.opacity = "1");
});

jukebox.addEventListener('click', () => {
    if (jukebox.classList.contains('active')) {
        ejectDisc();
        // CORRECT : On utilise stopVideo() de l'API YouTube
        if (player) player.stopVideo();
        jukebox.classList.remove('active');
    }
});

function updateDragPosition(e) {
    dragIcon.style.left = (e.clientX - 25) + 'px';
    dragIcon.style.top = (e.clientY - 25) + 'px';
}
document.getElementById('settings-btn').onclick = (e) => { 
    e.preventDefault(); 
    document.getElementById('settings-modal').style.display = 'flex'; 
};

document.getElementById('close-settings').onclick = () => { 
    document.getElementById('settings-modal').style.display = 'none'; 
};


// On récupère les deux éléments
const vSlider = document.getElementById('volume-slider');
const vText = document.getElementById('volume-value');

// Dès que le slider change (oninput)
vSlider.oninput = function() {
    // 1. On met à jour le texte (ex: "50%")
    vText.innerText = this.value + "%";
    
    // 2. On change le volume du lecteur YouTube s'il existe
    if (player && player.setVolume) {
        player.setVolume(this.value);
    }
};

function ejectDisc() {
    if (!currentDiscImg) return;
    const disc = document.createElement('img');
    disc.src = currentDiscImg;
    disc.className = 'ejected-disc';
    const rect = jukebox.getBoundingClientRect();
    let posX = rect.left + rect.width / 2 - 45;
    let posY = rect.top;
    let velocityY = -6; 
    let velocityX = (Math.random() - 0.5) * 4;
    const gravity = 0.15; 
    document.body.appendChild(disc);
    function animate() {
        velocityY += gravity; posX += velocityX; posY += velocityY;
        disc.style.left = posX + 'px'; disc.style.top = posY + 'px';
        disc.style.transform = `rotate(${posY * 0.5}deg)`;
        if (posY < window.innerHeight + 100) requestAnimationFrame(animate);
        else disc.remove();
    }
    animate();
}
</script>

</body>
</html>
