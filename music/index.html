<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AmaiCraft - Music Player</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        :root {
            --mc-panel: #c6c6c6;
            --mc-border-light: #ffffff;
            --mc-border-dark: #555555;
        }

        body {
            font-family: 'Minecraftia', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url('Leaves.png'); 
            background-repeat: repeat;
            background-size: 64px;
            background-attachment: fixed;
            overflow: hidden;
            color: white;
        }

        /* --- HEADER & NAV (Exactement comme ton accueil) --- */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #000;
            padding: 20px;
            text-align: center;
            position: relative;
            min-height: 70px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            text-shadow: 3px 3px 0px #3f3f3f;
            letter-spacing: 2px;
        }

        header img {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            height: 100%;
            width: auto;
        }

        .nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav a {
            background: #555;
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        /* --- ZONE JUKEBOX CENTRÉE --- */
        #jukebox-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #jukebox {
            width: 200px; /* Plus grand */
            cursor: pointer;
            transition: transform 0.1s;
            image-rendering: pixelated;
            z-index: 10;
        }

        #jukebox.active { filter: brightness(1.2); }

        /* --- INVENTAIRE --- */
        #inventory {
            background: var(--mc-panel);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px var(--mc-border-light), 
                        inset -4px -4px 0px var(--mc-border-dark);
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 80px; /* Place pour le footer */
            z-index: 20;
            align-self: center;
        }

        .disc {
            width: 50px; height: 50px;
            image-rendering: pixelated;
            cursor: pointer;
        }

        /* --- STEVE & ANIMATIONS --- */
        .steve-animation {
            position: fixed;
            bottom: 70px; left: -100px;
            width: 100px; z-index: 1000;
            pointer-events: auto; cursor: pointer;
            animation: walk-around 10s linear infinite;
            user-select: none; -webkit-user-drag: none;
        }

        .jumping { animation: walk-around 10s linear infinite, jump-animation 0.8s ease-in-out !important; }

        @keyframes jump-animation {
            0%, 100% { bottom: 70px; }
            50% { bottom: 250px; }
        }

        @keyframes walk-around {
            0%, 45% { left: -100px; transform: scaleX(-1); }
            50%, 95% { left: calc(100% - 100px); transform: scaleX(1); }
            100% { left: -100px; transform: scaleX(-1); }
        }

        /* --- AUTRES --- */
        .drag-cursor { position: fixed; width: 50px; height: 50px; pointer-events: none; z-index: 9999; image-rendering: pixelated; display: none; }
        .ejected-disc { position: absolute; width: 90px; pointer-events: none; z-index: 5; image-rendering: pixelated; }
        
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 15px; text-align: center; font-size: 12px;
            background-color: #1a1a1a; color: #aaaaaa; border-top: 4px solid #000; z-index: 2000;
        }
    </style>
</head>
<body>

<header>
    <h1>AMAICRAFT - MUSIC PLAYER</h1>
    <img src="parrotparty.gif" alt="Parrot Party">
</header>

<div class="nav">
    <a href="index.html">ACCUEIL</a>
    <a href="https://minecraft.wiki">WIKI</a>
    <a href="https://www.minecraft.net/fr-fr/minecraft-tips-for-beginners">GUIDES</a>
</div>

<div id="jukebox-container">
    <img src="Jukebox.png" id="jukebox" alt="Jukebox">
</div>

<div id="inventory"></div>

<img src="steverunning.gif" class="steve-animation" alt="Steve running">

<audio id="player" loop></audio>

<footer>
    Page communautaire Minecraft - Non officielle <br>
    Copyright &copy; Mojang AB.
</footer>

<script>
const jukebox = document.getElementById('jukebox');
const player = document.getElementById('player');
const inventory = document.getElementById('inventory');
const steve = document.querySelector('.steve-animation');

const dragIcon = document.createElement('img');
dragIcon.className = 'drag-cursor';
document.body.appendChild(dragIcon);

let isDragging = false;
let currentDiscData = null;
let currentDiscImg = null;

const discNames = ["5", "11", "13", "blocks", "cat", "chirp", "creator", "far", "mall", "mellohi", "otherside", "pigstep", "relic", "stal", "strad", "wait", "ward"];

// Génération disques
discNames.forEach(name => {
    const img = document.createElement('img');
    img.src = `Discs/${name}.png`;
    img.className = 'disc';
    img.dataset.audio = `Discs/${name}.ogg`;
    img.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isDragging = true;
        currentDiscData = { audio: img.dataset.audio, src: img.src };
        dragIcon.src = img.src;
        dragIcon.style.display = 'block';
        updateDragPosition(e);
        img.style.opacity = "0.5";
    });
    inventory.appendChild(img);
});

// Drag & Drop
window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    updateDragPosition(e);
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
        jukebox.style.transform = "scale(1.1) rotate(5deg)";
    } else {
        jukebox.style.transform = "scale(1)";
    }
});

window.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
        player.src = currentDiscData.audio;
        player.play();
        currentDiscImg = currentDiscData.src;
        jukebox.classList.add('active');
    }
    isDragging = false;
    dragIcon.style.display = 'none';
    document.querySelectorAll('.disc').forEach(d => d.style.opacity = "1");
});

// Ejection
jukebox.addEventListener('click', () => {
    if (jukebox.classList.contains('active')) {
        ejectDisc();
        player.pause();
        player.src = "";
        jukebox.classList.remove('active');
        jukebox.style.transform = "scale(1)";
    }
});

function updateDragPosition(e) {
    dragIcon.style.left = (e.clientX - 25) + 'px';
    dragIcon.style.top = (e.clientY - 25) + 'px';
}

function ejectDisc() {
    if (!currentDiscImg) return;
    const disc = document.createElement('img');
    disc.src = currentDiscImg;
    disc.className = 'ejected-disc';
    const rect = jukebox.getBoundingClientRect();
    let posX = rect.left + rect.width / 2 - 45;
    let posY = rect.top;
    let velocityY = -6; 
    let velocityX = (Math.random() - 0.5) * 4;
    const gravity = 0.15; 
    document.body.appendChild(disc);

    function animate() {
        velocityY += gravity; posX += velocityX; posY += velocityY;
        disc.style.left = posX + 'px'; disc.style.top = posY + 'px';
        disc.style.transform = `rotate(${posY * 0.5}deg)`;
        if (posY < window.innerHeight + 100) requestAnimationFrame(animate);
        else disc.remove();
    }
    animate();
}

// Steve Jump
steve.addEventListener('click', () => {
    if (!steve.classList.contains('jumping')) {
        steve.classList.add('jumping');
        setTimeout(() => steve.classList.remove('jumping'), 800);
    }
});
</script>
</body>
</html>
