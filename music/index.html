<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AmaiCraft Jukebox</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        :root {
            --mc-gui-panel: #c6c6c6;
            --mc-border-dark: #555555;
            --mc-border-light: #ffffff;
        }

        body {
            /* ON REMET TON FOND LEAVES */
            background-image: url("Leaves.png");
            background-size: 64px;
            background-repeat: repeat;
            image-rendering: pixelated;
            font-family: 'Minecraftia', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- LE MENU DU HAUT (COPIÉ DE L'ACCUEIL) --- */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #000;
            padding: 20px;
            text-align: center;
            position: relative;
            min-height: 70px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            color: white;
            text-shadow: 3px 3px 0px #3f3f3f;
            letter-spacing: 2px;
        }

        header img {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            height: 100%;
            width: auto;
        }

        .nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav a {
            background: #555;
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        /* --- JUKEBOX BIEN AU CENTRE --- */
        #jukebox-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #jukebox {
            width: 220px; /* On le garde un peu plus grand pour le style */
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
            image-rendering: pixelated;
        }

        #jukebox.active { transform: scale(1.1); }

        /* --- INVENTAIRE --- */
        #inventory {
            background: var(--mc-gui-panel);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0 var(--mc-border-light), inset -4px -4px 0 var(--mc-border-dark);
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            z-index: 20;
            align-self: center;
        }

        .disc {
            width: 50px; height: 50px;
            cursor: pointer;
            image-rendering: pixelated;
        }

        .ejected-disc {
            position: absolute;
            width: 90px;
            pointer-events: none;
            z-index: 50;
            image-rendering: pixelated;
        }

        .drag-cursor {
            position: fixed;
            width: 50px; height: 50px;
            pointer-events: none;
            z-index: 9999;
            image-rendering: pixelated;
            display: none;
        }

        img { -webkit-user-drag: none; user-select: none; }
        
        /* Bloque la sélection bleue */
        .disc, #inventory, #jukebox {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

<header>
    <h1>AMAICRAFT</h1>
    <img src="../parrotparty.gif" alt="Parrot Party">
</header>

<div class="nav">
    <a href="../index.html">ACCUEIL</a>
    <a href="https://minecraft.wiki">WIKI</a>
    <a href="https://www.minecraft.net/fr-fr/minecraft-tips-for-beginners">GUIDES</a>
</div>

<div id="jukebox-container">
    <img src="Jukebox.png" id="jukebox" alt="Jukebox">
</div>

<div id="inventory"></div>

<div id="yt-player"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const jukebox = document.getElementById('jukebox');
const inventory = document.getElementById('inventory');

// Dictionnaire des IDs YouTube
const ytIds = {
    "13": "hEb-LopwclA",
    "cat": "1",
    "blocks": "1",
    "chirp": "1",
    "far": "1",
    "mall": "1",
    "mellohi": "1",
    "stal": "1",
    "strad": "1",
    "ward": "1",
    "11": "1",
    "wait": "1",
    "pigstep": "1",
    "otherside": "1",
    "creator": "hYp99uW4YfU",
    "creator_(music_box)": "1",
    "5": "mBRO4iNKSbg",
    "relic": "1",
    "precipice": "1",
    "tears": "1",
    "lava_chicken": "1"
    
    
    
    
    
    
    
    
    
    
};
let player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
        height: '0', width: '0', videoId: '',
        playerVars: { 
            'autoplay': 1, 
            'controls': 0,
            'origin': window.location.origin // Aide YouTube à accepter ton site
        },
        events: {
            'onReady': (event) => {
                event.target.unMute(); // TRÈS IMPORTANT
                event.target.setVolume(100);
            }
        }
    });
}
const dragIcon = document.createElement('img');
dragIcon.className = 'drag-cursor';
document.body.appendChild(dragIcon);

let isDragging = false;
let currentDiscData = null;
let currentDiscImg = null;
const discNames = Object.keys(ytIds);

discNames.forEach(name => {
    const img = document.createElement('img');
    img.src = `Discs/${name}.png`;
    img.className = 'disc';
    img.dataset.id = name; // ON DOIT UTILISER DATA-ID
    
    img.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isDragging = true;
        // ON STOCKE L'ID ICI
        currentDiscData = { id: img.dataset.id, src: img.src }; 
        dragIcon.src = img.src;
        dragIcon.style.display = 'block';
        updateDragPosition(e);
        img.style.opacity = "0.5";
    });
    inventory.appendChild(img);
});

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    updateDragPosition(e);
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
        jukebox.style.transform = "scale(1.1) rotate(5deg)";
    } else {
        jukebox.style.transform = "scale(1)";
    }
});

window.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
        
        // On récupère directement l'id (ex: "cat") stocké dans currentDiscData
        const discName = currentDiscData.id; 
        const videoId = ytIds[discName];

        if (videoId && player) {
            player.loadVideoById({
                videoId: videoId,
                startSeconds: 0,
                suggestedQuality: 'small'
            });
            player.playVideo();
            
            currentDiscImg = currentDiscData.src;
            jukebox.classList.add('active');
            jukebox.style.transform = "scale(1)";
        }
    }
    isDragging = false;
    dragIcon.style.display = 'none';
    document.querySelectorAll('.disc').forEach(d => d.style.opacity = "1");
});

jukebox.addEventListener('click', () => {
    if (jukebox.classList.contains('active')) {
        ejectDisc();
        // CORRECT : On utilise stopVideo() de l'API YouTube
        if (player) player.stopVideo();
        jukebox.classList.remove('active');
    }
});

function updateDragPosition(e) {
    dragIcon.style.left = (e.clientX - 25) + 'px';
    dragIcon.style.top = (e.clientY - 25) + 'px';
}

function ejectDisc() {
    if (!currentDiscImg) return;
    const disc = document.createElement('img');
    disc.src = currentDiscImg;
    disc.className = 'ejected-disc';
    const rect = jukebox.getBoundingClientRect();
    let posX = rect.left + rect.width / 2 - 45;
    let posY = rect.top;
    let velocityY = -6; 
    let velocityX = (Math.random() - 0.5) * 4;
    const gravity = 0.15; 
    document.body.appendChild(disc);
    function animate() {
        velocityY += gravity; posX += velocityX; posY += velocityY;
        disc.style.left = posX + 'px'; disc.style.top = posY + 'px';
        disc.style.transform = `rotate(${posY * 0.5}deg)`;
        if (posY < window.innerHeight + 100) requestAnimationFrame(animate);
        else disc.remove();
    }
    animate();
}
</script>

</body>
</html>
