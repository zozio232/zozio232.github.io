<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AmaiCraft Jukebox</title>
    <style>
        :root {
            --mc-gui-panel: #c6c6c6;
            --mc-gui-button: #7e7e7e;
            --mc-border-dark: #555555;
            --mc-border-light: #ffffff;
        }

        body {
            background-image: url("Leaves.png");
            background-size: 64px;
            background-repeat: repeat;
            image-rendering: pixelated;
            font-family: sans-serif; /* Remplace par ta police Minecraft */
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- JUKEBOX CENTRAL --- */
        #jukebox-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #jukebox {
            width: 150px;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
            image-rendering: pixelated;
        }

        #jukebox.active { transform: scale(1.1); }

        /* --- INVENTAIRE DES DISQUES --- */
        #inventory {
            background: var(--mc-gui-panel);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0 var(--mc-border-light), inset -4px -4px 0 var(--mc-border-dark);
            padding: 15px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            z-index: 20;
        }

        .disc {
            width: 50px;
            height: 50px;
            cursor: grab;
            image-rendering: pixelated;
            user-select: none;
            -webkit-user-drag: element;
        }

        /* --- DISQUE ÉJECTÉ (Animation) --- */
        .ejected-disc {
            position: absolute;
            width: 80px; /* Plus gros ! */
            pointer-events: none;
            z-index: 50; /* On s'assure qu'il passe devant le Jukebox */
            image-rendering: pixelated;
        }

        .wiki-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
        
        }


        /* Le disque qui suit la souris */
.drag-cursor {
    position: fixed;
    width: 50px;
    height: 50px;
    pointer-events: none; /* Indispensable pour ne pas gêner le clic sur le jukebox */
    z-index: 9999;
    image-rendering: pixelated;
    display: none; /* Caché par défaut */
}

/* On désactive le drag natif sur TOUTES les images */
img {
    -webkit-user-drag: none;
    user-select: none;
    
}

/* Bloque la sélection et le drag natif sur tout ce qui est interactif */
.disc, #inventory, #jukebox {
    user-select: none;           /* Empêche le surlignage bleu */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    
    -webkit-user-drag: none;     /* Empêche le navigateur de "détacher" l'image */
    
    touch-action: none;          /* Empêche le scroll/zoom sur mobile pendant le drag */
    -webkit-touch-callout: none; /* Empêche le menu contextuel sur iOS */
}

/* Optionnel : force le curseur sur toute la page pendant le drag pour éviter les changements */
body.dragging {
    cursor: grabbing !important;
}
    </style>
</head>
<body>

<a href="https://fr.minecraft.wiki/w/Disque" target="_blank" class="wiki-link">Wiki Disques</a>

<div id="jukebox-container">
    <img src="Jukebox.png" id="jukebox" alt="Jukebox">
</div>

<div id="inventory"></div>

<audio id="player" loop></audio>

<script>
const jukebox = document.getElementById('jukebox');
const player = document.getElementById('player');
const inventory = document.getElementById('inventory');

const dragIcon = document.createElement('img');
dragIcon.className = 'drag-cursor';
document.body.appendChild(dragIcon);

let isDragging = false;
let currentDiscData = null;
let currentDiscImg = null; // Variable bien déclarée ici

const discNames = ["5", "11", "13", "blocks", "cat", "chirp", "creator", "far", "mall", "mellohi", "otherside", "pigstep", "relic", "stal", "strad", "wait", "ward"];

discNames.forEach(name => {
    const img = document.createElement('img');
    img.src = `Discs/${name}.png`;
    img.className = 'disc';
    img.dataset.audio = `Discs/${name}.ogg`;
    
    img.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isDragging = true;
        currentDiscData = {
            audio: img.dataset.audio,
            src: img.src
        };
        dragIcon.src = img.src;
        dragIcon.style.display = 'block';
        updateDragPosition(e);
        img.style.opacity = "0.5";
    });
    inventory.appendChild(img);
});

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    updateDragPosition(e);
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && 
        e.clientY > rect.top && e.clientY < rect.bottom) {
        jukebox.style.transform = "scale(1.1) rotate(5deg)";
    } else {
        jukebox.style.transform = "scale(1)";
    }
});

window.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    const rect = jukebox.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right && 
        e.clientY > rect.top && e.clientY < rect.bottom) {
        
        player.src = currentDiscData.audio;
        player.play();
        currentDiscImg = currentDiscData.src; // On mémorise l'image du disque inséré
        jukebox.classList.add('active');
    }
    isDragging = false;
    dragIcon.style.display = 'none';
    document.querySelectorAll('.disc').forEach(d => d.style.opacity = "1");
    jukebox.style.transform = "scale(1)";
});

// --- LA PARTIE MANQUANTE : LE CLIC POUR ÉJECTER ---
jukebox.addEventListener('click', () => {
    // Si une musique est en cours (on vérifie src ou active)
    if (jukebox.classList.contains('active')) {
        ejectDisc();           // On lance l'animation
        player.pause();        // On arrête le son
        player.src = "";       // On vide la source
        jukebox.classList.remove('active'); // On remet le jukebox au repos
    }
});

function updateDragPosition(e) {
    dragIcon.style.left = (e.clientX - 25) + 'px';
    dragIcon.style.top = (e.clientY - 25) + 'px';
}

function ejectDisc() {
    if (!currentDiscImg) return;

    const disc = document.createElement('img');
    disc.src = currentDiscImg;
    disc.className = 'ejected-disc';
    
    const rect = jukebox.getBoundingClientRect();
    // On centre le gros disque par rapport au jukebox (80px / 2 = 40)
    let posX = rect.left + rect.width / 2 - 40; 
    let posY = rect.top;
    
    // --- RÉGLAGES DE LA PHYSIQUE ---
    let velocityY = -7;    // Moins haut (avant c'était -15)
    let velocityX = (Math.random() - 0.5) * 5; // Moins de dispersion latérale
    const gravity = 0.2;   // Chute beaucoup plus lente (avant c'était 0.8)

    document.body.appendChild(disc);

    function animate() {
        velocityY += gravity;
        posX += velocityX;
        posY += velocityY;

        disc.style.left = posX + 'px';
        disc.style.top = posY + 'px';
        
        // On ralentit aussi la rotation pour que ce soit moins nerveux
        disc.style.transform = `rotate(${posY * 0.8}deg)`;

        if (posY < window.innerHeight + 100) {
            requestAnimationFrame(animate);
        } else {
            disc.remove();
        }
    }
    animate();
}
</script>

</body>
</html>
