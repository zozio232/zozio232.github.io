<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>AmaiCraft Mob Sound Player</title>

    <style>

        @font-face {
            font-family: 'Minecraftia';
            font-style: normal;
            font-weight: 400;
            src: local('Minecraftia'), url('../Minecraftia.woff') format('woff');
        }

        body {
            font-family: 'Minecraftia', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            /* Texture de fond */
            background-image: url('bricks.jpg'); 
            background-repeat: repeat;
            background-size: 64px;
            background-attachment: fixed;
            color: white;

            
        }

        header img {
            /* --- POSITIONNEMENT --- */
            position: absolute;
            right: 0;   /* Collé au mur de droite */
            top: 0;
            bottom: 0;
            
            /* --- TAILLE --- */
            height: 100%;
            width: auto;
        }
        /* HEADER */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #000;
            padding: 20px;
            text-align: center;

                /* --- AJOUT INDISPENSABLE --- */
            position: relative; /* Sert de repère pour le perroquet */
            overflow: hidden;    /* Empêche le perroquet de déborder si besoin */
            min-height: 70px;   /* Ajuste selon la taille de ton texte pour pas que ce soit trop plat */
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            text-shadow: 3px 3px 0px #3f3f3f;
            letter-spacing: 2px;
        }

        /* NAV BAR STYLE BOUTONS MC */
        .nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav a {
            background: #555;
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover {
            background: #8b8b8b;
            border-top-color: #dbdbdb;
            border-left-color: #dbdbdb;
        }


        :root {

            --mc-gui-panel: #c6c6c6;

            --mc-gui-button: #7e7e7e;

            --mc-gui-shadow: #555555;

            --mc-gui-light: #ffffff;

            --mc-text-shadow: #3f3f3f;

        }
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            background-color: #1a1a1a;
            color: #aaaaaa;
            border-top: 4px solid #000;
            z-index: 2000;
        }





        /* Container principal */
        .container {
            padding: 20px;
            margin-bottom: 100px; /* Espace pour le footer */
        }

        /* Style des boutons dossiers */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: -4px; /* Pour coller au contenu */
        }

      .tab-btn {
            /* Couleurs de base Minecraft */
            background-color: #7e7e7e;
            color: #ffffff;
            
            /* Police et texte */
            font-family: 'Minecraftia', sans-serif;
            font-size: 14px;
            text-shadow: 2px 2px 0px #3f3f3f;
            
            /* Bordures complexes (Effet 3D Pixel) */
            border: 2px solid #000000;
            box-shadow: inset -2px -4px 0px #4a4a4a, /* Ombre interne */
                        inset 2px 4px 0px #ababab;  /* Lumière interne */
            
            padding: 10px 20px;
            cursor: pointer;
            position: relative;
            margin: 0 2px;
            
            /* Empêche la sélection du texte */
            user-select: none;
            transition: none; /* Pas de transition fluide, Minecraft est "instantané" */
        }

        .tab-btn:hover {
            transform: scale(1.03);
            background: #7a7a7a;
            outline: 3px solid white; /* Sélection blanche comme dans l'inventaire */
        }
        .tab-btn:active {
            background-color: #4e4e4e;
            box-shadow: inset 2px 4px 0px #2a2a2a, /* Inversion des ombres */
                        inset -2px -4px 0px #7e7e7e;
            padding-top: 12px; /* Simulation d'enfoncement */
            padding-bottom: 8px;
        }
        .tab-btn.active {
            background-color: #555555;
            border-color: #ffffff;
            box-shadow: inset 2px 4px 0px #2a2a2a; /* Reste "enfoncé" */
        }
        /* Zone du contenu (le "dossier") */
        .folder-content {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #000;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
        }

        /* Carte du Mob */

        /* Filtre Rouge quand on clique (Flash de dégâts) */
        /* L'effet de "dégât" Minecraft */
        .mob-card.playing {
            /* Mix de filtres pour obtenir un rouge pur et saturé */
            filter: sepia(100%) saturate(500%) hue-rotate(-50deg) brightness(0.8);
            
            /* Le petit saut/contraction du mob */
            transform: scale(0.9);
            
            /* Bordure rouge pour accentuer l'effet */
            border-color: #ff0000;
            
            /* Animation fluide mais rapide */
            transition: all 0.1s ease-out;
        }
        #mob-container {
            user-select: none;
            -webkit-user-drag: none;
        }
        /* Carte du Mob ajustée */
        .mob-card {
            background: #4e4e4e;
            border: 4px solid #000;
            padding: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            position: relative;
        }

        .mob-card img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            image-rendering: pixelated;
            pointer-events: none; /* Empêche de cliquer/glisser l'image seule */
            transition: transform 0.1s, filter 0.1s;
        }
        .mob-card.playing img {
            filter: sepia(100%) saturate(600%) hue-rotate(-50deg) brightness(0.7);
            transform: scale(0.85); /* Le mob se contracte */
        }
        /* État désactivé pendant le cooldown */
        .mob-card.cooldown {
            cursor: not-allowed;
            filter: grayscale(0.4);
        }






    </style>

</head>

<body>
<header>
    <h1>AMAICRAFT</h1>
    <img src="../parrotparty.gif" alt="Parrot Party">
</header>

<div class="nav">
    <a href="../index.html">HOME</a>
    <a href="https://minecraft.wiki" target="_blank" rel="noopener noreferrer">WIKI</a>
    <a href="https://www.minecraft.net/fr-fr/minecraft-tips-for-beginners" target="_blank" rel="noopener noreferrer">GUIDES</a>
</div>
<main class="container">
    <div class="tabs">
        <button class="tab-btn" onclick="openFolder('Passive')">PASSIVE</button>
        <button class="tab-btn" onclick="openFolder('Neutral')">NEUTRAL</button>
        <button class="tab-btn" onclick="openFolder('Hostile')">HOSTILE</button>
        <button class="tab-btn" onclick="openFolder('Fool')">FOOL</button>
    </div>

    <div id="mob-container" class="folder-content">
        </div>
</main>
<img src="Tree.png" alt="Tree" style="position: fixed; bottom: 62px; left: 0; width: 150px; height: auto; z-index: 1000; pointer-events: none;">
<footer>
    <a href="https://ko-fi.com/amaicraft" target="_blank" style="color: #13c3ff; text-decoration: none;" rel="noopener noreferrer" id="Don">
        ☕ Buy me a Coffee
    </a> <br>
    <strong>Community Page 
        <a href="https://www.minecraft.net/" target="_blank" rel="noopener noreferrer" style="color: #85b6ee; text-decoration: none;">Minecraft</a></strong> — Unofficial website<br>
</footer>
</body>
<script>

    window.onload = function() {
        const Coff = document.getElementById('Don');
        const text = Coff.innerText;
        Coff.innerHTML = ''; // On vide le titre pour le reconstruire

        for (let char of text) {
            const span = document.createElement('span');
            span.innerText = char;
            
            // Génération d'une couleur pastel
            // On reste sur des valeurs hautes (entre 127 et 255) pour garder de la clarté
            const hue = Math.floor(Math.random() * 360);
            const color = `hsl(${hue}, 100%, 80%)`;
            span.style.color = color;
            span.style.textDecoration = 'underline';
            span.style.textDecorationColor = color;
            span.style.textDecorationThickness = '2px';
            
            Coff.appendChild(span);
        }
    };






    let allMobs = [];
    const COOLDOWN_TIME = 800; // Temps en millisecondes (0.8s)

    fetch('mobs.json')
        .then(response => response.json())
        .then(data => {
            allMobs = data;
            openFolder('Passive');
        });

    function openFolder(category) {
        const container = document.getElementById('mob-container');
        container.innerHTML = '';

        const filteredMobs = allMobs.filter(m => m.category.toLowerCase() === category.toLowerCase());

        filteredMobs.forEach(mob => {
            const card = document.createElement('div');
            card.className = 'mob-card';
            // Plus de texte, juste l'image
            card.innerHTML = `<img src="${mob.image}" alt="${mob.name}" title="${mob.name}">`;

            // On utilise une variable locale pour le cooldown de cette carte précise
            let isWaiting = false;

            card.onclick = () => {
                if (isWaiting) return; // Si en cooldown, on ne fait rien

                isWaiting = true;
                playRandomSound(mob.sounds, card);

                // Activation du cooldown visuel
                card.classList.add('cooldown');

                // Désactivation du cooldown après le délai
                setTimeout(() => {
                    isWaiting = false;
                    card.classList.remove('cooldown');
                }, COOLDOWN_TIME);
            };

            container.appendChild(card);
        });
    }

    function playRandomSound(soundList, element) {
        if (!soundList || soundList.length === 0) return;

        const randomSound = soundList[Math.floor(Math.random() * soundList.length)];
        const audio = new Audio(randomSound);

        // Ajoute la classe à la carte
        element.classList.add('playing');
        
        audio.play();

        // Retire l'effet rouge très vite (durée d'un hit Minecraft)
        setTimeout(() => {
            element.classList.remove('playing');
        }, 150); 
    }
</script>
</html>
