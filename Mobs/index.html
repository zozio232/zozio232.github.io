<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>AmaiCraft Mob Sound Player</title>

    <style>

        @font-face {
            font-family: 'Minecraftia';
            font-style: normal;
            font-weight: 400;
            src: local('Minecraftia'), url('../Minecraftia.woff') format('woff');
        }

        body {
            font-family: 'Minecraftia', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            /* Texture de fond */
            background-image: url('bricks.jpg'); 
            background-repeat: repeat;
            background-size: 64px;
            background-attachment: fixed;
            color: white;

            
        }

        header img {
            /* --- POSITIONNEMENT --- */
            position: absolute;
            right: 0;   /* Collé au mur de droite */
            top: 0;
            bottom: 0;
            
            /* --- TAILLE --- */
            height: 100%;
            width: auto;
        }
        /* HEADER */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #000;
            padding: 20px;
            text-align: center;

                /* --- AJOUT INDISPENSABLE --- */
            position: relative; /* Sert de repère pour le perroquet */
            overflow: hidden;    /* Empêche le perroquet de déborder si besoin */
            min-height: 70px;   /* Ajuste selon la taille de ton texte pour pas que ce soit trop plat */
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            text-shadow: 3px 3px 0px #3f3f3f;
            letter-spacing: 2px;
        }

        /* NAV BAR STYLE BOUTONS MC */
        .nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav a {
            background: #555;
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover {
            background: #8b8b8b;
            border-top-color: #dbdbdb;
            border-left-color: #dbdbdb;
        }


        :root {

            --mc-gui-panel: #c6c6c6;

            --mc-gui-button: #7e7e7e;

            --mc-gui-shadow: #555555;

            --mc-gui-light: #ffffff;

            --mc-text-shadow: #3f3f3f;

        }
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            background-color: #1a1a1a;
            color: #aaaaaa;
            border-top: 4px solid #000;
            z-index: 2000;
        }





        /* Container principal */
        .container {
            padding: 20px;
            margin-bottom: 100px; /* Espace pour le footer */
        }

        /* Style des boutons dossiers */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: -4px; /* Pour coller au contenu */
        }

        .tab-btn {
            background: #7e7e7e;
            border: 4px solid #000;
            border-bottom: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Minecraftia', sans-serif;
            margin-right: 5px;
        }

        .tab-btn:hover {
            background: #aaaaaa;
        }

        /* Zone du contenu (le "dossier") */
        .folder-content {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #000;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
        }

        /* Carte du Mob */
        .mob-card {
            background: #4e4e4e;
            border: 3px solid #000;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .mob-card img {
            width: 64px;
            height: 64px;
            image-rendering: pixelated; /* Garde l'aspect pixel de Minecraft */
        }

        /* Filtre Rouge quand on clique (Flash de dégâts) */
        .mob-card.playing {
            filter: sepia(100%) saturate(500%) hue-rotate(-50deg);
            transform: scale(0.95);
        }








    </style>

</head>

<body>
<header>
    <h1>AMAICRAFT</h1>
    <img src="../parrotparty.gif" alt="Parrot Party">
</header>

<div class="nav">
    <a href="../index.html">ACCUEIL</a>
    <a href="https://minecraft.wiki" target="_blank" rel="noopener noreferrer">WIKI</a>
    <a href="https://www.minecraft.net/fr-fr/minecraft-tips-for-beginners" target="_blank" rel="noopener noreferrer">GUIDES</a>
</div>
<main class="container">
    <div class="tabs">
        <button class="tab-btn" onclick="openFolder('passive')">PASSIVE</button>
        <button class="tab-btn" onclick="openFolder('neutral')">NEUTRAL</button>
        <button class="tab-btn" onclick="openFolder('hostile')">HOSTILE</button>
        <button class="tab-btn" onclick="openFolder('fool')">FOOL</button>
    </div>

    <div id="passive" class="folder-content">
        <div class="mob-card" onclick="playMobSound('cow', this)">
            <img src="mobs/cow.png" alt="Cow">
            <p>Cow</p>
        </div>
        </div>

    <div id="neutral" class="folder-content" style="display:none;">
        <div class="mob-card" onclick="playMobSound('enderman', this)">
            <img src="mobs/enderman.png" alt="Enderman">
            <p>Enderman</p>
        </div>
    </div>

    <div id="hostile" class="folder-content" style="display:none;">
        <div class="mob-card" onclick="playMobSound('creeper', this)">
            <img src="mobs/creeper.png" alt="Creeper">
            <p>Creeper</p>
        </div>
    </div>

    <div id="fool" class="folder-content" style="display:none;">
        </div>
</main>

<footer>
    <strong>Page communautaire Minecraft</strong> — Site non officiel<br>
    Ce site n'est pas affilié à Mojang AB.
</footer>
</body>
<script>
    // Fonction pour changer de dossier
    function openFolder(folderName) {
        // Masquer tous les dossiers
        const folders = document.querySelectorAll('.folder-content');
        folders.forEach(f => f.style.display = 'none');

        // Afficher le dossier sélectionné
        document.getElementById(folderName).style.display = 'grid';
    }

    // Fonction pour jouer un son au hasard
    function playMobSound(mobName, element) {
        // Liste des sons par mob (à adapter selon tes fichiers réels)
        // Exemple : mob/hostile/creeper1.mp3, creeper2.mp3...
        const soundCount = 3; // Supposons que tu as 3 sons par mob
        const randomIndex = Math.floor(Math.random() * soundCount) + 1;
        
        // On récupère le type (parent) pour le chemin du dossier
        const type = element.parentElement.id;
        const audioPath = `mob/${type}/${mobName}${randomIndex}.mp3`;
        
        const audio = new Audio(audioPath);
        
        // Appliquer le filtre rouge
        element.classList.add('playing');
        
        audio.play();

        // Retirer le filtre après 500ms (durée du "flash")
        audio.onended = () => element.classList.remove('playing');
        // Sécurité si le son est long :
        setTimeout(() => element.classList.remove('playing'), 500);
    }
</script>
</html>
