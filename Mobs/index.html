<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>AmaiCraft Mob Sound Player</title>

    <style>

        @font-face {
            font-family: 'Minecraftia';
            font-style: normal;
            font-weight: 400;
            src: local('Minecraftia'), url('../Minecraftia.woff') format('woff');
        }

        body {
            font-family: 'Minecraftia', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            /* Texture de fond */
            background-image: url('bricks.jpg'); 
            background-repeat: repeat;
            background-size: 64px;
            background-attachment: fixed;
            color: white;

            
        }

        header img {
            /* --- POSITIONNEMENT --- */
            position: absolute;
            right: 0;   /* Collé au mur de droite */
            top: 0;
            bottom: 0;
            
            /* --- TAILLE --- */
            height: 100%;
            width: auto;
        }
        /* HEADER */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #000;
            padding: 20px;
            text-align: center;

                /* --- AJOUT INDISPENSABLE --- */
            position: relative; /* Sert de repère pour le perroquet */
            overflow: hidden;    /* Empêche le perroquet de déborder si besoin */
            min-height: 70px;   /* Ajuste selon la taille de ton texte pour pas que ce soit trop plat */
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            text-shadow: 3px 3px 0px #3f3f3f;
            letter-spacing: 2px;
        }

        /* NAV BAR STYLE BOUTONS MC */
        .nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav a {
            background: #555;
            border: 2px solid #000;
            border-top-color: #ababab;
            border-left-color: #ababab;
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover {
            background: #8b8b8b;
            border-top-color: #dbdbdb;
            border-left-color: #dbdbdb;
        }


        :root {

            --mc-gui-panel: #c6c6c6;

            --mc-gui-button: #7e7e7e;

            --mc-gui-shadow: #555555;

            --mc-gui-light: #ffffff;

            --mc-text-shadow: #3f3f3f;

        }
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            background-color: #1a1a1a;
            color: #aaaaaa;
            border-top: 4px solid #000;
            z-index: 2000;
        }





        /* Container principal */
        .container {
            padding: 20px;
            margin-bottom: 100px; /* Espace pour le footer */
        }

        /* Style des boutons dossiers */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: -4px; /* Pour coller au contenu */
        }

        .tab-btn {
            background: #7e7e7e;
            border: 4px solid #000;
            border-bottom: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Minecraftia', sans-serif;
            margin-right: 5px;
        }

        .tab-btn:hover {
            background: #aaaaaa;
        }

        /* Zone du contenu (le "dossier") */
        .folder-content {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #000;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
        }

        /* Carte du Mob */

        /* Filtre Rouge quand on clique (Flash de dégâts) */
        /* L'effet de "dégât" Minecraft */
        .mob-card.playing {
            /* Mix de filtres pour obtenir un rouge pur et saturé */
            filter: sepia(100%) saturate(500%) hue-rotate(-50deg) brightness(0.8);
            
            /* Le petit saut/contraction du mob */
            transform: scale(0.9);
            
            /* Bordure rouge pour accentuer l'effet */
            border-color: #ff0000;
            
            /* Animation fluide mais rapide */
            transition: all 0.1s ease-out;
        }

        /* Carte du Mob ajustée */
        .mob-card {
            background: #4e4e4e;
            border: 3px solid #000;
            padding: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1; /* Force un carré parfait */
            transition: background 0.2s;
        }

        .mob-card img {
            width: 90%; /* L'image prend presque toute la place */
            height: 90%;
            object-fit: contain; /* Garde les proportions de l'image */
            image-rendering: pixelated;
        }

        /* État désactivé pendant le cooldown */
        .mob-card.cooldown {
            cursor: not-allowed;
            opacity: 0.7;
            filter: grayscale(0.5);
}






    </style>

</head>

<body>
<header>
    <h1>AMAICRAFT</h1>
    <img src="../parrotparty.gif" alt="Parrot Party">
</header>

<div class="nav">
    <a href="../index.html">ACCUEIL</a>
    <a href="https://minecraft.wiki" target="_blank" rel="noopener noreferrer">WIKI</a>
    <a href="https://www.minecraft.net/fr-fr/minecraft-tips-for-beginners" target="_blank" rel="noopener noreferrer">GUIDES</a>
</div>
<main class="container">
    <div class="tabs">
        <button class="tab-btn" onclick="openFolder('Passive')">PASSIVE</button>
        <button class="tab-btn" onclick="openFolder('Neutral')">NEUTRAL</button>
        <button class="tab-btn" onclick="openFolder('Hostile')">HOSTILE</button>
        <button class="tab-btn" onclick="openFolder('Fool')">FOOL</button>
    </div>

    <div id="mob-container" class="folder-content">
        </div>
</main>
<footer>
    <strong>Page communautaire Minecraft</strong> — Site non officiel<br>
    Ce site n'est pas affilié à Mojang AB.
</footer>
</body>
<script>
    let allMobs = [];
    const COOLDOWN_TIME = 800; // Temps en millisecondes (0.8s)

    fetch('mobs.json')
        .then(response => response.json())
        .then(data => {
            allMobs = data;
            openFolder('Passive');
        });

    function openFolder(category) {
        const container = document.getElementById('mob-container');
        container.innerHTML = '';

        const filteredMobs = allMobs.filter(m => m.category.toLowerCase() === category.toLowerCase());

        filteredMobs.forEach(mob => {
            const card = document.createElement('div');
            card.className = 'mob-card';
            // Plus de texte, juste l'image
            card.innerHTML = `<img src="${mob.image}" alt="${mob.name}" title="${mob.name}">`;

            // On utilise une variable locale pour le cooldown de cette carte précise
            let isWaiting = false;

            card.onclick = () => {
                if (isWaiting) return; // Si en cooldown, on ne fait rien

                isWaiting = true;
                playRandomSound(mob.sounds, card);

                // Activation du cooldown visuel
                card.classList.add('cooldown');

                // Désactivation du cooldown après le délai
                setTimeout(() => {
                    isWaiting = false;
                    card.classList.remove('cooldown');
                }, COOLDOWN_TIME);
            };

            container.appendChild(card);
        });
    }

    function playRandomSound(soundList, element) {
        if (!soundList || soundList.length === 0) return;

        const randomSound = soundList[Math.floor(Math.random() * soundList.length)];
        const audio = new Audio(randomSound);

        // On active l'effet rouge
        element.classList.add('playing');
        
        audio.play();

        // On retire l'effet rouge après 200ms 
        // (C'est la durée standard d'un flash de dégât dans MC)
        setTimeout(() => {
            element.classList.remove('playing');
        }, 200);
    }
</script>
</html>
