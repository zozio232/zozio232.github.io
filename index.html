<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmaiCraft</title>

<style>
/* Importation d'une police style Minecraft (optionnel mais recommandé) */
@font-face {
    font-family: 'Minecraftia';
    font-style: normal;
    font-weight: 400;
    src: local('Minecraftia'), url('Minecraftia.woff') format('woff');
}

/* ---  STEVE --- */
.steve-animation {
    position: fixed;
    bottom: 70px;
    left: -100px;
    width: 100px;
    z-index: 1000;

    pointer-events: auto; 
    cursor: pointer;
    animation: walk-around 10s linear infinite;
    transition: transform 0.1s;

    user-select: none;
    -webkit-user-drag: none;
    touch-action: manipulation;
}


@keyframes jump-animation {
    0% { bottom: 70px; animation-timing-function: ease-out; }
    50% { bottom: 250px; animation-timing-function: ease-in; } /* Hauteur du saut */
    100% { bottom: 70px; }
}


.jumping {
    animation: walk-around 10s linear infinite, jump-animation 0.8s ease-in-out !important;
}

@keyframes walk-around {
    0% {
        left: -100px;
        transform: scaleX(-1); /* Regarde vers la droite (si de base il regarde à gauche) */
    }
    45% {
        transform: scaleX(-1); /* Continue de regarder à droite */
    }
    50% {
        left: calc(100% - 100px);
        transform: scaleX(1); /* Se retourne vers la gauche */
    }
    95% {
        transform: scaleX(1); /* Continue de regarder à gauche */
    }
    100% {
        left: -100px;
        transform: scaleX(-1); /* Se retourne pour recommencer */
    }
}

footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    
    padding: 15px;
    text-align: center;
    font-size: 12px;
    background-color: #1a1a1a;
    color: #aaaaaa;
    border-top: 4px solid #000;
    z-index: 2000;
}


:root {
    --mc-bg: #313233;
    --mc-panel: #c6c6c6;
    --mc-border-light: #ffffff;
    --mc-border-dark: #555555;
    --mc-button-hover: #7a7a7a;
    --mc-link: #52a4ff;
}

body {
    font-family: 'Minecraftia', 'Segoe UI', Arial, sans-serif;
    margin: 0;
    /* Texture de fond */
    background-image: url('cherry_leaves.png'); 
    background-repeat: repeat;
    background-size: 64px;
    background-attachment: fixed;
    color: white;

    
}

header img {
    /* --- POSITIONNEMENT --- */
    position: absolute;
    right: 0;   /* Collé au mur de droite */
    top: 0;
    bottom: 0;
    
    /* --- TAILLE --- */
    height: 100%;
    width: auto;
}
/* HEADER */
header {
    background: rgba(0, 0, 0, 0.8);
    border-bottom: 4px solid #000;
    padding: 20px;
    text-align: center;

        /* --- AJOUT INDISPENSABLE --- */
    position: relative; /* Sert de repère pour le perroquet */
    overflow: hidden;    /* Empêche le perroquet de déborder si besoin */
    min-height: 70px;   /* Ajuste selon la taille de ton texte pour pas que ce soit trop plat */
}

header h1 {
    margin: 0;
    font-size: 28px;
    text-shadow: 3px 3px 0px #3f3f3f;
    letter-spacing: 2px;
}

/* NAV BAR STYLE BOUTONS MC */
.nav {
    background: rgba(0, 0, 0, 0.6);
    padding: 10px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.nav a {
    background: #555;
    border: 2px solid #000;
    border-top-color: #ababab;
    border-left-color: #ababab;
    padding: 8px 15px;
    color: white;
    text-decoration: none;
    font-size: 14px;
}

.nav a:hover {
    background: #8b8b8b;
    border-top-color: #dbdbdb;
    border-left-color: #dbdbdb;
}

/* CONTENEUR PRINCIPAL (Style Inventaire) */
.container {
    max-width: 1000px;
    margin: 30px auto;
    background: var(--mc-panel);
    border: 4px solid #000;
    /* Effet biseau style UI Minecraft */
    box-shadow: inset 4px 4px 0px var(--mc-border-light), 
                inset -4px -4px 0px var(--mc-border-dark);
    padding: 30px;
    color: #3f3f3f; /* Texte sombre sur fond clair comme dans les livres MC */
}

h2 {
    border-bottom: 3px solid #3f3f3f;
    padding-bottom: 10px;
    margin-top: 0;
    font-size: 22px;
    color: #1d1d1d;
}

/* GRID STYLE BLOCS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
}

/* CARTES STYLE SLOT D'INVENTAIRE */
.card {
    background: #8b8b8b;
    border: 3px solid #000;
    border-top-color: #373737; /* Ombre inversée pour creuser l'item */
    border-left-color: #373737;
    border-right-color: #ffffff;
    border-bottom-color: #ffffff;
    padding: 15px;
    height: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: transform 0.1s;
    cursor: pointer;
}

.card strong {
    color: #ffff55; /* Couleur or Minecraft */
    font-size: 16px;
    text-shadow: 2px 2px 0px #3f3f15;
}

.card span {
    color: #e0e0e0;
    font-size: 12px;
    margin-top: 5px;
}

.card:hover {
    transform: scale(1.03);
    background: #7a7a7a;
    outline: 3px solid white; /* Sélection blanche comme dans l'inventaire */
}

/* LIENS */
a {
    text-decoration: none;
}

/* FOOTER */
footer {
    margin-top: 40px;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    background-color: #1a1a1a;
    color: #aaaaaa;
    border-top: 4px solid #000;
}


</style>
</head>

        </a>

        <a href="commands/index.html">

        <a href="music/index.html">

        <a href="Mobs/index.html">

<img src="steverunning.gif" class="steve-animation" alt="Steve running">
<footer>
    Page communautaire Minecraft - Non officielle <br>
    Copyright &copy; Mojang AB.
</footer>

</body>
<script>
    const steve = document.querySelector('.steve-animation');

    steve.addEventListener('click', () => {
        // Si Steve n'est pas déjà en train de sauter
        if (!steve.classList.contains('jumping')) {
            steve.classList.add('jumping');

            // On retire la classe après 800ms (durée de l'animation)
            setTimeout(() => {
                steve.classList.remove('jumping');
            }, 800);
        }
    });
</script>
</html>
